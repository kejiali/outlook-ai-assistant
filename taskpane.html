<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Email Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #ffffff;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #0078d4;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 6px;
    }

    .section { margin-bottom: 14px; }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    #tone-row {
      display: none;
      margin-top: 6px;
    }

    #tone-row.visible {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    textarea:focus, select:focus {
      outline: none;
      border-color: #0078d4;
    }

    /* Provider selector */
    .provider-toggle {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
    }

    .provider-toggle button {
      flex: 1;
      border: none;
      background: #f5f5f5;
      padding: 7px 4px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      transition: background 0.15s, color 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .provider-toggle button:first-child {
      border-right: 1px solid #ccc;
    }

    .provider-toggle button.active {
      background: #0078d4;
      color: white;
    }

    .provider-toggle button .provider-name {
      font-weight: 600;
      font-size: 12px;
    }

    .provider-toggle button .provider-desc {
      font-size: 10px;
      opacity: 0.8;
    }

    /* Route indicator */
    #route-indicator {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #route-indicator .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }

    #route-indicator.openclaw .dot { background: #107c10; }
    #route-indicator.openai .dot   { background: #0078d4; }

    #draft-btn {
      width: 100%;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    #draft-btn:hover { background: #106ebe; }
    #draft-btn:disabled { background: #a0c4e8; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
    }

    #status.error {
      background: #fde7e9;
      color: #a4262c;
      border: 1px solid #f1707b;
      display: block;
    }

    #status.success {
      background: #dff6dd;
      color: #107c10;
      border: 1px solid #6ccb5f;
      display: block;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 14px 0;
    }
  </style>
</head>
<body>
  <h1>✉️ AI Draft Reply</h1>

  <!-- Provider selector -->
  <div class="section">
    <div class="section-label">AI Provider</div>
    <div class="provider-toggle">
      <button id="btn-openclaw" class="active" onclick="setProvider('openclaw')">
        <span class="provider-name">🦞 OpenClaw</span>
        <span class="provider-desc">Claude · Local · Free</span>
      </button>
      <button id="btn-openai" onclick="setProvider('openai')">
        <span class="provider-name">⚡ OpenAI</span>
        <span class="provider-desc">GPT-4o-mini · Cloud</span>
      </button>
    </div>
    <div id="route-indicator" class="openclaw">
      <div class="dot"></div>
      <span id="route-text">Routing via OpenClaw local proxy → Claude Sonnet (Bedrock)</span>
    </div>
  </div>

  <hr class="divider"/>

  <div class="section">
    <div class="section-label">Rewrite Modes</div>
    <div class="checkbox-group">
      <label><input type="checkbox" id="mode-professional"> Make professional</label>
      <label><input type="checkbox" id="mode-concise"> Make concise</label>
      <label><input type="checkbox" id="mode-grammar"> Fix grammar</label>
      <label><input type="checkbox" id="mode-tone"> Change tone</label>
      <div id="tone-row">
        <span style="font-size:12px;color:#666;">Tone:</span>
        <select id="tone-select">
          <option value="formal">Formal</option>
          <option value="friendly">Friendly</option>
          <option value="assertive">Assertive</option>
          <option value="empathetic">Empathetic</option>
        </select>
      </div>
    </div>
  </div>

  <hr class="divider"/>

  <div class="section">
    <div class="section-label">Extra Instructions (optional)</div>
    <textarea id="extra-instructions" placeholder="e.g. Keep it under 3 sentences. Mention the deadline."></textarea>
  </div>

  <button id="draft-btn">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Draft Reply</span>
  </button>

  <div id="status"></div>

  <script src="config.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
